<!DOCTYPE html>
<html>
<head>
  <title>Sorting Algorithm Visualizer</title>

  <style>
    body {
      background: #0f172a;
      color: white;
      text-align: center;
      font-family: Arial;
    }

    h1 {
      margin-top: 20px;
    }

    input, button {
      padding: 8px;
      margin: 5px;
      border-radius: 6px;
      border: none;
    }

    button {
      background: #22c55e;
      color: white;
      cursor: pointer;
      transition: 0.2s;
    }

    button:hover {
      transform: scale(1.05);
      background: #16a34a;
    }

    #array {
      display: flex;
      justify-content: center;
      align-items: flex-end;
      height: 400px;
      margin-top: 30px;
      border: 1px solid #334155;
    }

    .bar {
      width: 18px;
      margin: 2px;
      background: cyan;
      text-align: center;
      font-size: 12px;
      color: black;
    }

    #status {
      font-size: 20px;
      margin-top: 15px;
      color: yellow;
    }

    #timer {
      font-size: 18px;
      margin-top: 5px;
      color: cyan;
    }
  </style>
</head>

<body>

<h1>Sorting Algorithm Visualizer</h1>

<input id="manualInput" placeholder="5,3,8,1,6">
<button onclick="useInput()">Use Input</button>

<br>

<button onclick="generate()">Generate Random</button>
<button onclick="bubbleSort()">Bubble Sort</button>

<div id="status">Status: Waiting...</div>
<div id="timer">Time: 0 ms</div>

<div id="array"></div>

<script>

let arr = [];
let delay = 150;

// Sleep function
function sleep(ms){
  return new Promise(r => setTimeout(r, ms));
}

// Create bars
function updateBars(){
  let container = document.getElementById("array");
  container.innerHTML = "";

  for(let i=0;i<arr.length;i++){
    let bar = document.createElement("div");
    bar.classList.add("bar");

    bar.style.height = (arr[i]*10 + 20) + "px";
    bar.innerText = arr[i];

    container.appendChild(bar);
  }
}

// Generate random values
function generate(){
  arr = [];
  for(let i=0;i<25;i++){
    arr.push(Math.floor(Math.random()*30)+5);
  }
  updateBars();
}

// Manual input
function useInput(){
  let input = document.getElementById("manualInput").value;

  arr = input.split(",")
             .map(x => parseInt(x))
             .filter(x => !isNaN(x));

  updateBars();
}

// Bubble Sort
async function bubbleSort(){

  let start = Date.now();
  let bars = document.getElementsByClassName("bar");

  for(let i=0;i<arr.length;i++){

    for(let j=0;j<arr.length-i-1;j++){

      document.getElementById("status").innerText =
        "Comparing: " + arr[j] + " vs " + arr[j+1];

      bars[j].style.background = "yellow";
      bars[j+1].style.background = "yellow";

      await sleep(delay);

      if(arr[j] > arr[j+1]){

        document.getElementById("status").innerText =
          "Swapping: " + arr[j] + " ↔ " + arr[j+1];

        bars[j].style.background = "red";
        bars[j+1].style.background = "red";

        await sleep(delay);

        let temp = arr[j];
        arr[j] = arr[j+1];
        arr[j+1] = temp;

        updateBars();
        bars = document.getElementsByClassName("bar");
      }

      bars[j].style.background = "cyan";
      bars[j+1].style.background = "cyan";
    }

    bars[arr.length-i-1].style.background = "green";
  }

  let end = Date.now();

  document.getElementById("timer").innerText =
    "Time: " + (end - start) + " ms";

  document.getElementById("status").innerText =
    "✅ Sorting Completed";
}

</script>

</body>
</html>
